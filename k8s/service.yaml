apiVersion: v1
kind: Service
metadata:
  name: reqap
  namespace: reqap
spec:
  selector:
    app: reqap
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
# Optional: expose externally via LoadBalancer
# Change type to LoadBalancer or use an Ingress instead
apiVersion: v1
kind: Service
metadata:
  name: reqap-external
  namespace: reqap
spec:
  selector:
    app: reqap
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: LoadBalancer
