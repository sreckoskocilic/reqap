# DO NOT store real keys here. Use kubectl or an external secrets operator.
#
# Option 1 — kubectl (recommended):
#   kubectl create secret generic reqap-secrets --namespace reqap \
#     --from-literal=GEMINI_API_KEY=AIza...   \
#     --from-literal=GROQ_API_KEY=gsk_...     \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#
# Option 2 — .env file (local dev only, never commit):
#   echo "GEMINI_API_KEY=AIza..." >> .env
#   echo "GROQ_API_KEY=gsk_..."  >> .env
#
# Option 3 — External secrets operator (production):
#   https://external-secrets.io
apiVersion: v1
kind: Secret
metadata:
  name: reqap-secrets
  namespace: reqap
type: Opaque
data: {}  # populated via kubectl create secret, not here
