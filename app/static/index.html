<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reqap — Book Review</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #7c6af7;
      --accent-dim: #4a3fa0;
      --text: #e2e4ef;
      --text-dim: #7a7d95;
      --success: #4ade80;
      --warn: #facc15;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: var(--text-dim);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 760px;
    }

    /* --- Upload zone --- */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 106, 247, 0.07);
    }
    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    #drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    #drop-zone .label { font-size: 1rem; color: var(--text-dim); }
    #drop-zone .label strong { color: var(--accent); }
    #file-name {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--success);
      font-weight: 500;
      min-height: 1.2em;
    }

    /* --- Options --- */
    .options {
      display: flex;
      gap: 1rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .opt-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 160px;
    }
    label.opt-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    select, .toggle-row {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--accent); }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      user-select: none;
    }
    .toggle-row input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

    /* --- Submit button --- */
    #submit-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    #submit-btn:hover { background: #9580ff; }
    #submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* --- Progress --- */
    #progress-area {
      display: none;
      margin-top: 1.5rem;
    }
    .progress-bar-wrap {
      background: var(--bg);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      border-radius: 999px;
      width: 0%;
      transition: width 0.4s ease;
    }
    #status-msg {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    /* --- Thinking --- */
    #thinking-area {
      display: none;
      margin-top: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .thinking-header {
      background: rgba(124,106,247,0.12);
      padding: 0.5rem 0.9rem;
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    #thinking-content {
      padding: 0.75rem 0.9rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: "SF Mono", "Fira Code", monospace;
      white-space: pre-wrap;
      max-height: 180px;
      overflow-y: auto;
      background: var(--bg);
    }

    /* --- Review output --- */
    #review-area {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    #review-area h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 1rem;
    }
    #review-content {
      font-size: 0.97rem;
      line-height: 1.75;
      color: var(--text);
    }

    /* Markdown styles */
    #review-content h1, #review-content h2, #review-content h3 {
      color: #c4b5fd;
      margin: 1.4em 0 0.5em;
      font-weight: 600;
    }
    #review-content h1 { font-size: 1.4rem; }
    #review-content h2 { font-size: 1.15rem; }
    #review-content h3 { font-size: 1rem; }
    #review-content p { margin-bottom: 0.9em; }
    #review-content ul, #review-content ol {
      padding-left: 1.5rem;
      margin-bottom: 0.9em;
    }
    #review-content li { margin-bottom: 0.3em; }
    #review-content strong { color: #e2e8ff; }
    #review-content em { color: #a5b4fc; }
    #review-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin-left: 0;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Cursor blink during streaming */
    .cursor::after {
      content: "▋";
      animation: blink 1s step-end infinite;
      color: var(--accent);
      font-size: 0.85em;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* --- Stats bar --- */
    #stats-bar {
      display: none;
      margin-top: 1.25rem;
      padding: 0.7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-dim);
      display: none;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 0.1rem; }
    .stat span:first-child { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat span:last-child { color: var(--text); font-weight: 500; font-size: 0.9rem; }

    /* --- Error --- */
    #error-box {
      display: none;
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    /* --- Chapter picker --- */
    #chapter-area {
      margin-top: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .chapter-head {
      background: rgba(124,106,247,0.08);
      padding: 0.6rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      gap: 0.5rem;
    }
    .chapter-head-left { display: flex; flex-direction: column; gap: 0.1rem; overflow: hidden; }
    .chapter-head-left strong { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chapter-head-left small { color: var(--text-dim); font-size: 0.75rem; }
    .chapter-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .chapter-actions button {
      padding: 0.2rem 0.55rem;
      font-size: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chapter-actions button:hover { border-color: var(--accent); color: var(--text); }
    #chapter-list { max-height: 200px; overflow-y: auto; background: var(--bg); }
    #chapter-loading {
      padding: 0.75rem 0.9rem;
      font-size: 0.85rem;
      color: var(--text-dim);
      background: var(--bg);
    }
    .ch-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.38rem 0.9rem;
      border-bottom: 1px solid rgba(42,45,58,0.5);
      cursor: pointer;
      transition: background 0.1s;
    }
    .ch-item:last-child { border-bottom: none; }
    .ch-item:hover { background: rgba(124,106,247,0.06); }
    .ch-item input { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .ch-item .ch-title {
      font-size: 0.875rem; color: var(--text);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ch-item .ch-tokens { font-size: 0.72rem; color: var(--text-dim); flex-shrink: 0; }

    /* --- Reset button --- */
    #reset-btn {
      display: none;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.875rem;
      transition: border-color 0.2s, color 0.2s;
    }
    #reset-btn:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>
  <header>
    <h1>reqap</h1>
    <p>Upload a book, script, or text — get a comprehensive AI report</p>
  </header>

  <div class="card">
    <!-- Upload -->
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".epub,.txt" />
      <div class="icon">📚</div>
      <div class="label">Drop your <strong>.epub</strong> or <strong>.txt</strong> here or click to browse</div>
      <div id="file-name"></div>
    </div>

    <!-- Chapter picker -->
    <div id="chapter-area" style="display:none">
      <div class="chapter-head">
        <div class="chapter-head-left">
          <strong id="book-info-title"></strong>
          <small id="book-info-sub"></small>
        </div>
        <div class="chapter-actions">
          <button id="sel-all-btn">All</button>
          <button id="sel-none-btn">None</button>
        </div>
      </div>
      <div id="chapter-list">
        <div id="chapter-loading">Parsing chapters…</div>
      </div>
    </div>

    <!-- Options -->
    <div class="options">
      <div class="opt-group">
        <label class="opt-label" for="report-select">Report Type</label>
        <select id="report-select">
          <optgroup label="Fiction">
            <option value="review">Book Review</option>
            <option value="summary">Summary</option>
            <option value="chapter-summaries">Chapter Summaries</option>
            <option value="characters">Character Map</option>
            <option value="timeline">Timeline</option>
            <option value="themes">Themes &amp; Motifs</option>
            <option value="quotes">Key Quotes</option>
            <option value="reading-guide">Reading Guide</option>
          </optgroup>
          <optgroup label="Non-fiction">
            <option value="argument-map">Argument Map</option>
            <option value="action-items">Action Items</option>
          </optgroup>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label" for="mode-select">LLM Mode</label>
        <select id="mode-select">
          <option value="">Default (server setting)</option>
          <optgroup label="Free">
            <option value="free-gemini">Gemini 1.5 Flash — 1M ctx, 15 RPM free</option>
            <option value="free-hybrid">Free hybrid — Groq notes + Gemini synthesis</option>
            <option value="free-groq">Groq — llama3.3 70B, 128K ctx free</option>
            <option value="offline">Offline — Local Ollama (no internet)</option>
          </optgroup>
          <optgroup label="Paid">
            <option value="online">Claude Opus — best quality</option>
            <option value="hybrid">Claude hybrid — Haiku notes + Opus synthesis</option>
          </optgroup>
        </select>
      </div>
      </div>
      <div class="opt-group">
        <label class="opt-label">Options</label>
        <label class="toggle-row">
          <input type="checkbox" id="thinking-toggle" />
          Show thinking
        </label>
      </div>
    </div>

    <button id="submit-btn" disabled>Generate Review</button>

    <!-- Progress -->
    <div id="progress-area">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div id="status-msg">Initialising…</div>
    </div>

    <!-- Error -->
    <div id="error-box"></div>

    <!-- Thinking -->
    <div id="thinking-area">
      <div class="thinking-header">🧠 Model thinking</div>
      <div id="thinking-content"></div>
    </div>

    <!-- Review -->
    <div id="review-area">
      <h2 id="review-heading">Review</h2>
      <div id="review-content"></div>
    </div>

    <!-- Stats -->
    <div id="stats-bar">
      <div class="stat"><span>Input tokens</span><span id="s-input">—</span></div>
      <div class="stat"><span>Output tokens</span><span id="s-output">—</span></div>
      <div class="stat"><span>Cache hit</span><span id="s-cache">—</span></div>
      <div class="stat"><span>Time</span><span id="s-time">—</span></div>
    </div>

    <button id="reset-btn">← Review another book</button>
  </div>

  <script>
    const fileInput   = document.getElementById('file-input');
    const dropZone    = document.getElementById('drop-zone');
    const fileName    = document.getElementById('file-name');
    const submitBtn   = document.getElementById('submit-btn');
    const reportSelect = document.getElementById('report-select');
    const modeSelect  = document.getElementById('mode-select');
    const thinkToggle = document.getElementById('thinking-toggle');
    const progressArea = document.getElementById('progress-area');
    const progressBar  = document.getElementById('progress-bar');
    const statusMsg    = document.getElementById('status-msg');
    const errorBox     = document.getElementById('error-box');
    const thinkingArea = document.getElementById('thinking-area');
    const thinkingContent = document.getElementById('thinking-content');
    const reviewArea   = document.getElementById('review-area');
    const reviewContent = document.getElementById('review-content');
    const statsBar     = document.getElementById('stats-bar');
    const resetBtn     = document.getElementById('reset-btn');

    let selectedFile = null;
    let rawReviewText = '';
    let renderTimer = null;
    let chapterData = [];   // [{index, title, tokens}]

    const chapterArea    = document.getElementById('chapter-area');
    const chapterList    = document.getElementById('chapter-list');
    const chapterLoading = document.getElementById('chapter-loading');
    const bookInfoTitle  = document.getElementById('book-info-title');
    const bookInfoSub    = document.getElementById('book-info-sub');
    const selAllBtn      = document.getElementById('sel-all-btn');
    const selNoneBtn     = document.getElementById('sel-none-btn');

    // --- File selection ---
    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      setFile(e.dataTransfer.files[0]);
    });

    function setFile(file) {
      if (!file) return;
      if (!file.name.endsWith('.epub') && !file.name.endsWith('.txt')) {
        showError('Please select an .epub or .txt file.');
        return;
      }
      selectedFile = file;
      fileName.textContent = `✓ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Generate Review';
      errorBox.style.display = 'none';
      fetchChapters(file);
    }

    async function fetchChapters(file) {
      chapterData = [];
      chapterList.innerHTML = '';
      chapterList.appendChild(chapterLoading);
      chapterLoading.style.display = 'block';
      chapterArea.style.display = 'block';

      const form = new FormData();
      form.append('epub_file', file);

      let res;
      try {
        res = await fetch('/api/epub/chapters', { method: 'POST', body: form });
      } catch (err) {
        chapterLoading.textContent = '⚠ Network error: ' + err.message;
        return;
      }

      const data = await res.json();
      chapterLoading.style.display = 'none';

      if (data.error) {
        chapterLoading.textContent = '⚠ ' + data.error;
        chapterLoading.style.display = 'block';
        return;
      }

      chapterData = data.chapters;
      bookInfoTitle.textContent = `${data.title} — ${data.author}`;
      bookInfoSub.textContent = `${data.chapters.length} chapters`;

      chapterList.innerHTML = '';
      for (const ch of data.chapters) {
        const row = document.createElement('label');
        row.className = 'ch-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.dataset.index = ch.index;
        cb.addEventListener('change', updateSubmitBtn);

        const title = document.createElement('span');
        title.className = 'ch-title';
        title.textContent = ch.title;

        const tokens = document.createElement('span');
        tokens.className = 'ch-tokens';
        tokens.textContent = ch.tokens > 999
          ? `~${(ch.tokens / 1000).toFixed(0)}k tok`
          : `~${ch.tokens} tok`;

        row.appendChild(cb);
        row.appendChild(title);
        row.appendChild(tokens);
        chapterList.appendChild(row);
      }

      updateSubmitBtn();
    }

    selAllBtn.addEventListener('click', () => {
      chapterList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
      updateSubmitBtn();
    });
    selNoneBtn.addEventListener('click', () => {
      chapterList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
      updateSubmitBtn();
    });

    function updateSubmitBtn() {
      const checked = chapterList.querySelectorAll('input[type=checkbox]:checked').length;
      const total = chapterData.length;
      submitBtn.disabled = checked === 0;
      submitBtn.textContent = total === 0 ? 'Generate Review'
        : checked === total ? 'Generate Review'
        : `Generate Review (${checked} / ${total} chapters)`;
    }

    function getSelectedIndices() {
      const checked = [...chapterList.querySelectorAll('input[type=checkbox]:checked')];
      const total = chapterData.length;
      if (checked.length === total) return '';  // all selected → send empty (use all)
      return checked.map(cb => cb.dataset.index).join(',');
    }

    // --- Submit ---
    submitBtn.addEventListener('click', startReview);

    async function startReview() {
      if (!selectedFile) return;

      // Reset UI
      rawReviewText = '';
      reviewContent.innerHTML = '';
      document.getElementById('review-heading').textContent =
        reportSelect.options[reportSelect.selectedIndex].text;
      reviewContent.classList.add('cursor');
      thinkingContent.textContent = '';
      errorBox.style.display = 'none';
      statsBar.style.display = 'none';
      resetBtn.style.display = 'none';

      submitBtn.disabled = true;
      progressArea.style.display = 'block';
      reviewArea.style.display = 'block';
      setProgress(5, 'Uploading…');

      if (thinkToggle.checked) {
        thinkingArea.style.display = 'block';
      }

      const form = new FormData();
      form.append('epub_file', selectedFile);
      form.append('show_thinking', thinkToggle.checked ? 'true' : 'false');
      form.append('report_type', reportSelect.value);
      if (modeSelect.value) form.append('llm_mode', modeSelect.value);
      const indices = getSelectedIndices();
      if (indices) form.append('chapter_indices', indices);

      const url = '/api/reviews/stream';

      let response;
      try {
        response = await fetch(url, { method: 'POST', body: form });
      } catch (err) {
        showError('Network error: ' + err.message);
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      setProgress(10, 'Connected — starting review…');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE frames
        const frames = buffer.split('\n\n');
        buffer = frames.pop(); // keep incomplete frame

        for (const frame of frames) {
          if (!frame.trim()) continue;
          let eventType = 'message';
          let dataStr = '';

          for (const line of frame.split('\n')) {
            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
            else if (line.startsWith('data: ')) dataStr = line.slice(6).trim();
          }

          if (!dataStr) continue;
          let payload;
          try { payload = JSON.parse(dataStr); } catch { continue; }

          handleEvent(eventType, payload);
        }
      }

      reviewContent.classList.remove('cursor');
      rerenderMarkdown(); // final render
    }

    function handleEvent(type, payload) {
      switch (type) {
        case 'progress':
          updateProgress(payload);
          break;
        case 'text':
          rawReviewText += payload.text;
          scheduleRender();
          break;
        case 'thinking':
          thinkingContent.textContent += payload.text;
          thinkingContent.scrollTop = thinkingContent.scrollHeight;
          break;
        case 'done':
          setProgress(100, `Done — ${payload.title} by ${payload.author}`);
          showStats(payload);
          resetBtn.style.display = 'inline-block';
          break;
        case 'error':
          showError(payload.message || 'Unknown error');
          resetBtn.style.display = 'inline-block';
          break;
      }
    }

    // Throttled markdown rendering during streaming
    function scheduleRender() {
      if (renderTimer) return;
      renderTimer = setTimeout(() => {
        rerenderMarkdown();
        renderTimer = null;
      }, 80);
    }

    function rerenderMarkdown() {
      reviewContent.innerHTML = marked.parse(rawReviewText);
    }

    // --- Progress helpers ---
    const stageProgress = { parsing: 15, notes: 65, synthesis: 85 };
    let notesProgress = { current: 0, total: 1 };

    function updateProgress(payload) {
      const base = stageProgress[payload.stage] || 10;
      let pct = base;

      if (payload.stage === 'notes' && payload.total) {
        notesProgress = { current: payload.current, total: payload.total };
        pct = 15 + ((payload.current / payload.total) * 50);
      }

      setProgress(Math.round(pct), payload.message);
    }

    function setProgress(pct, msg) {
      progressBar.style.width = pct + '%';
      if (msg) statusMsg.textContent = msg;
    }

    function showStats(p) {
      document.getElementById('s-input').textContent  = (p.input_tokens || 0).toLocaleString();
      document.getElementById('s-output').textContent = (p.output_tokens || 0).toLocaleString();
      document.getElementById('s-cache').textContent  = p.cache_read_tokens ? p.cache_read_tokens.toLocaleString() : 'n/a';
      document.getElementById('s-time').textContent   = p.elapsed_seconds ? `${p.elapsed_seconds}s` : '—';
      statsBar.style.display = 'flex';
    }

    function showError(msg) {
      errorBox.textContent = '⚠ ' + msg;
      errorBox.style.display = 'block';
      progressArea.style.display = 'none';
      submitBtn.disabled = !selectedFile;
    }

    // --- Reset ---
    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      chapterData = [];
      fileInput.value = '';
      fileName.textContent = '';
      rawReviewText = '';
      reviewContent.innerHTML = '';
      thinkingContent.textContent = '';
      chapterList.innerHTML = '';
      chapterArea.style.display = 'none';
      progressArea.style.display = 'none';
      reviewArea.style.display = 'none';
      thinkingArea.style.display = 'none';
      statsBar.style.display = 'none';
      errorBox.style.display = 'none';
      resetBtn.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Generate Review';
    });
  </script>
</body>
</html>
